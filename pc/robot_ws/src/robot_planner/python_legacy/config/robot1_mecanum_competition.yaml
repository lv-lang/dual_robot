/robot1/robot1_mecanum_competition_planner:
  ros__parameters:
    global_path_topic: /robot1/global_path
    odom_topic: /robot1/odom
    scan_topic: /robot1/scan
    local_obstacles_topic: /robot1/local_obstacles
    local_path_topic: /robot1/local_path
    cmd_vel_raw_topic: /robot1/cmd_vel_raw
    planner_state_topic: /robot1/planner_state

    planner_mode: mecanum_competition
    fallback_planner_mode: simple_tracker
    enable_lateral_motion: true
    enable_vy: true
    use_local_obstacles: false

    control_frequency: 15.0
    control_period: 0.10
    path_timeout: 0.0
    odom_timeout: 0.5
    scan_timeout: 0.5
    require_fresh_scan: true
    velocity_feedback_mode: last_command

    min_vx: 0.0
    max_vx: 0.35
    max_vy: 0.22
    max_wz: 0.80
    track_vx: 0.24
    bypass_vx: 0.12
    sidestep_vy: 0.18
    rejoin_vy: 0.14
    goal_max_vx: 0.12
    goal_max_vy: 0.08
    goal_max_wz: 0.35

    acc_lim_x: 0.40
    acc_lim_y: 0.35
    acc_lim_theta: 0.90
    jerk_lim_x: 1.00
    jerk_lim_y: 0.80
    jerk_lim_theta: 1.80
    cmd_filter_alpha: 0.45
    low_pass_alpha: 0.45
    vy_deadband: 0.015
    wz_deadband: 0.020

    robot_length: 0.24
    robot_width: 0.20
    obstacle_margin: 0.08
    obstacle_range: 2.5
    obstacle_angle_stride: 2
    front_check_distance: 0.75
    front_blocked_distance: 0.45
    front_stop_distance: 0.32
    hard_stop_distance_m: 0.10
    front_stop_angle: 0.70
    bypass_check_distance: 0.90
    side_check_distance: 0.55
    side_forward_window: 0.35
    side_min_clearance: 0.28
    side_clearance_required: 0.28
    side_hysteresis: 0.08
    side_clearance_delta: 0.20
    min_bypass_offset: 0.25
    max_bypass_offset: 0.50
    max_path_deviation: 0.70
    preferred_bypass_side: left
    allow_rotation_when_blocked: false

    obstacle_confirm_frames: 2
    obstacle_clear_frames: 4
    min_state_duration: 0.4
    side_switch_cooldown: 1.2
    rejoin_tolerance: 0.12
    goal_approach_distance: 0.45
    goal_approach_path_length: 0.55
    xy_goal_tolerance: 0.12
    yaw_goal_tolerance: 0.35
    stopped_v_threshold: 0.03

    lookahead_distance_track: 0.50
    lookahead_distance_bypass: 0.35
    lookahead_distance_rejoin: 0.45
    sim_time: 1.0
    dt: 0.1
    use_dynamic_window: true
    soft_vy: 0.08
    hard_vy: 0.16
    rejoin_gain: 0.65
    heading_gain: 1.10
    lateral_gain: 0.75
    perturb_vx: 0.03
    perturb_vy: 0.03
    perturb_wz: 0.10

    w_progress: 1.0
    w_path: 2.2
    w_lateral_target: 3.0
    w_obstacle: 4.0
    w_heading: 0.9
    w_smooth: 2.0
    w_jerk: 1.5
    w_side_switch: 5.0
    w_rotation: 1.4
    w_goal: 3.0

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 12.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.008
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.10
      movement_time_allowance: 18.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.18
      stateful: true
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: -0.12
      max_vel_x: 0.36
      max_vel_y: 0.14
      max_vel_theta: 0.45
      min_speed_xy: 0.0
      max_speed_xy: 0.38
      min_speed_theta: 0.0
      acc_lim_x: 1.2
      acc_lim_y: 0.75
      acc_lim_theta: 0.65
      decel_lim_x: -0.8
      decel_lim_y: -0.75
      decel_lim_theta: -0.65
      vx_samples: 24
      vy_samples: 11
      vtheta_samples: 31
      sim_time: 1.8
      linear_granularity: 0.03
      angular_granularity: 0.02
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: [RotateToGoal, Oscillation, PreferForward, BaseObstacle, GoalAlign, PathAlign, PathDist, GoalDist]
      BaseObstacle.scale: 2.8
      PreferForward.scale: 4.0
      PreferForward.penalty: 20.0
      PreferForward.strafe_x: 0.10
      PreferForward.strafe_theta: 0.45
      PreferForward.theta_scale: 0.2
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.32
      GoalAlign.scale: 3.5
      GoalAlign.forward_point_distance: 0.35
      PathDist.scale: 18.0
      GoalDist.scale: 20.0
      RotateToGoal.scale: 4.0
      RotateToGoal.slowing_factor: 3.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: mecanum/odom
      robot_base_frame: mecanum/base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.10
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /mecanum/scan
          max_obstacle_height: 2.0
          obstacle_min_range: 0.10
          raytrace_range: 3.0
          obstacle_range: 2.5
          clearing: true
          marking: true
          data_type: LaserScan
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.11
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: mecanum/base_footprint
      robot_radius: 0.10
      resolution: 0.05
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /map
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /mecanum/scan
          raytrace_range: 3.0
          obstacle_min_range: 0.10
          obstacle_range: 2.5
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.0
        inflation_radius: 0.40
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    topic_name: /map
    frame_id: map
    yaml_filename: ''

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, wait]
    spin:
      plugin: nav2_behaviors/Spin
      spin_type: SPIN_IN_PLACE
      rotation_velocity: 0.6
      max_rotational_vel: 0.8
      min_rotational_vel: 0.25
      rotational_acc_lim: 1.0
    backup:
      plugin: nav2_behaviors/BackUp
      backup_speed: -0.10
      backup_duration: 1.0
      simulate_ahead_time: 1.0
    wait:
      plugin: nav2_behaviors/Wait
      wait_duration: 5.0
    global_frame: mecanum/odom
    robot_base_frame: mecanum/base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.25
    rotational_acc_lim: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 25.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.36, 0.14, 0.45]
    min_velocity: [-0.10, -0.14, -0.45]
    max_accel: [1.2, 0.75, 0.65]
    max_decel: [-0.8, -0.75, -0.65]
    odom_topic: /mecanum/odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.01, 0.0]
    velocity_timeout: 1.0
